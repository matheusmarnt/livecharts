name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Note: Laravel 10 is supported by the package itself (see composer.json)
        # but cannot be exercised in CI because pestphp/pest-plugin-laravel ^3.0
        # requires Laravel 11+. The runtime contract on Laravel 10 is preserved
        # by the broader composer constraint.
        os: [ubuntu-latest, windows-latest]
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        livewire: ['^3.6.4', '^4.0']
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 11.*
            testbench: 9.*
          - laravel: 12.*
            testbench: 10.*
          - laravel: 13.*
            testbench: 11.*
        exclude:
          # Laravel 13 requires PHP 8.3+
          - laravel: 13.*
            php: '8.2'
          # Laravel 11 caps at PHP 8.4
          - laravel: 11.*
            php: '8.5'
          # Livewire 4 (v4.0.0) requires PHP 8.3+, Laravel 12+, and
          # illuminate/validation ^10|^11|^12 — no Laravel 13 yet.
          - livewire: '^4.0'
            php: '8.2'
          - livewire: '^4.0'
            laravel: 11.*
          - livewire: '^4.0'
            laravel: 13.*
          # Livewire ^3.6.4 fixes three published advisories (PKSA-g5js-3ypd-k2kr,
          # PKSA-9tny-xycd-bd72, PKSA-zng9-t7vy-y8kf). Composer on Windows runners
          # blocks installs of vulnerable releases regardless of --no-audit, so the
          # floor is raised. Mark the lowest-stability run accordingly.

    name: P${{ matrix.php }} L${{ matrix.laravel }} LW${{ matrix.livewire }} ${{ matrix.stability }} ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: pcov

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        shell: bash
        env:
          COMPOSER_AUDIT: '0'
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "livewire/livewire:${{ matrix.livewire }}" --no-interaction --no-update --no-audit
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-audit

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci --coverage --min=90
