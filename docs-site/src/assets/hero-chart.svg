<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none" role="img" aria-label="LiveCharts illustration">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="480" rx="24" fill="url(#bgGrad)"/>
  <rect width="600" height="480" rx="24" fill="url(#grid)" opacity="0.6"/>
  <ellipse cx="160" cy="120" rx="220" ry="160" fill="url(#glow)" opacity="0.7"/>

  <!-- window chrome -->
  <g transform="translate(28 28)">
    <circle cx="8" cy="8" r="5" fill="#ef4444"/>
    <circle cx="26" cy="8" r="5" fill="#f59e0b"/>
    <circle cx="44" cy="8" r="5" fill="#10b981"/>
  </g>

  <!-- chart card -->
  <g transform="translate(48 80)">
    <rect width="504" height="360" rx="16" fill="#0b1220" stroke="#1f2937" stroke-width="1"/>

    <!-- y-axis grid -->
    <g stroke="#1f2937" stroke-width="1" stroke-dasharray="2 4" opacity="0.7">
      <line x1="40" y1="40"  x2="480" y2="40"/>
      <line x1="40" y1="100" x2="480" y2="100"/>
      <line x1="40" y1="160" x2="480" y2="160"/>
      <line x1="40" y1="220" x2="480" y2="220"/>
      <line x1="40" y1="280" x2="480" y2="280"/>
    </g>

    <!-- y labels -->
    <g fill="#475569" font-family="ui-sans-serif,system-ui" font-size="10">
      <text x="14" y="44">100</text>
      <text x="14" y="104">80</text>
      <text x="14" y="164">60</text>
      <text x="14" y="224">40</text>
      <text x="14" y="284">20</text>
    </g>

    <!-- area fill -->
    <path
      d="M 40 240 L 100 200 L 160 220 L 220 140 L 280 170 L 340 90 L 400 130 L 460 60 L 460 300 L 40 300 Z"
      fill="url(#areaGrad)"/>

    <!-- main line -->
    <path
      d="M 40 240 L 100 200 L 160 220 L 220 140 L 280 170 L 340 90 L 400 130 L 460 60"
      stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
      fill="none" filter="url(#lineGlow)"/>

    <!-- secondary line -->
    <path
      d="M 40 270 L 100 250 L 160 245 L 220 220 L 280 230 L 340 195 L 400 205 L 460 175"
      stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      fill="none" stroke-dasharray="4 4" opacity="0.7"/>

    <!-- data points -->
    <g fill="#0b1220" stroke="#10b981" stroke-width="2.5">
      <circle cx="40"  cy="240" r="4"/>
      <circle cx="100" cy="200" r="4"/>
      <circle cx="160" cy="220" r="4"/>
      <circle cx="220" cy="140" r="4"/>
      <circle cx="280" cy="170" r="4"/>
      <circle cx="340" cy="90"  r="4"/>
      <circle cx="400" cy="130" r="4"/>
      <circle cx="460" cy="60"  r="4"/>
    </g>

    <!-- highlighted point -->
    <g>
      <circle cx="460" cy="60" r="10" fill="#10b981" opacity="0.25"/>
      <circle cx="460" cy="60" r="5" fill="#10b981"/>
      <rect x="402" y="22" width="100" height="28" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
      <text x="452" y="40" fill="#e2e8f0" font-family="ui-sans-serif,system-ui" font-size="11" text-anchor="middle" font-weight="600">+24% MoM</text>
    </g>

    <!-- x labels -->
    <g fill="#475569" font-family="ui-sans-serif,system-ui" font-size="10" text-anchor="middle">
      <text x="40"  y="320">Jan</text>
      <text x="100" y="320">Feb</text>
      <text x="160" y="320">Mar</text>
      <text x="220" y="320">Apr</text>
      <text x="280" y="320">May</text>
      <text x="340" y="320">Jun</text>
      <text x="400" y="320">Jul</text>
      <text x="460" y="320">Aug</text>
    </g>
  </g>
</svg>
